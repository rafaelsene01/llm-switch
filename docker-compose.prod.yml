services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runner
    ports:
      - "3000:3000"
    volumes:
      - api-data:/app/data
      - api-logs:/app/logs
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runner
      args:
        API_URL: http://api:3000
    ports:
      - "3001:3001"
    environment:
      - API_URL=http://api:3000
      - NEXT_PUBLIC_ADMIN_KEY=${ADMIN_KEY}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  api-data:
  api-logs:
