<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Gateway</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── RESET & VARS ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #080c10;
  --surface:   #0d1117;
  --border:    #1e2730;
  --border2:   #263040;
  --muted:     #3d4f60;
  --text:      #c9d4de;
  --text-dim:  #6b7f90;
  --accent:    #00e5c0;
  --accent-dim:#007a67;
  --accent-glow: rgba(0, 229, 192, 0.12);
  --red:       #ff4d6a;
  --red-dim:   rgba(255,77,106,0.12);
  --yellow:    #f0c040;
  --yellow-dim:rgba(240,192,64,0.1);
  --mono:      'IBM Plex Mono', monospace;
  --sans:      'IBM Plex Sans', sans-serif;
  --radius:    6px;
  --sidebar-w: 220px;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.6; }

/* ─── LAYOUT ────────────────────────────────────────────────────────────── */
#app { display: flex; height: 100vh; overflow: hidden; }

/* ─── SIDEBAR ───────────────────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 0;
  position: relative;
  overflow: hidden;
}

.sidebar::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 23px,
    rgba(0,229,192,0.02) 24px
  );
  pointer-events: none;
}

.sidebar-logo {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo .mark {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 3px;
  text-transform: uppercase;
  display: block;
}
.sidebar-logo .name {
  font-size: 18px;
  font-weight: 600;
  color: #fff;
  letter-spacing: -0.5px;
  margin-top: 4px;
}

.sidebar-status {
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
}
.status-dot {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 1px;
}
.status-dot::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }

.sidebar-nav { flex: 1; padding: 12px 0; }

.nav-section {
  padding: 8px 20px 4px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 20px;
  cursor: pointer;
  color: var(--text-dim);
  font-size: 13px;
  font-weight: 400;
  transition: all 0.15s;
  border-left: 2px solid transparent;
  position: relative;
}
.nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.nav-item.active {
  color: var(--accent);
  border-left-color: var(--accent);
  background: var(--accent-glow);
}
.nav-icon { width: 16px; text-align: center; font-size: 14px; opacity: 0.7; }
.nav-item.active .nav-icon { opacity: 1; }
.nav-badge {
  margin-left: auto;
  background: var(--accent-dim);
  color: var(--accent);
  font-family: var(--mono);
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 10px;
}

.sidebar-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
}

/* ─── MAIN ──────────────────────────────────────────────────────────────── */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 32px 40px;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}

/* ─── PAGE HEADER ───────────────────────────────────────────────────────── */
.page-header {
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.page-header h1 {
  font-size: 22px;
  font-weight: 600;
  color: #fff;
  letter-spacing: -0.5px;
}
.page-header p {
  margin-top: 4px;
  color: var(--text-dim);
  font-size: 13px;
}

/* ─── CARDS ─────────────────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 20px;
}
.card-title {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ─── BUTTONS ───────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius);
  border: 1px solid transparent;
  font-family: var(--mono);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 500;
  white-space: nowrap;
}
.btn-primary {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}
.btn-primary:hover { background: #00ffd4; }
.btn-ghost {
  background: transparent;
  color: var(--text-dim);
  border-color: var(--border2);
}
.btn-ghost:hover { color: var(--text); border-color: var(--muted); background: rgba(255,255,255,0.04); }
.btn-danger {
  background: transparent;
  color: var(--red);
  border-color: rgba(255,77,106,0.3);
}
.btn-danger:hover { background: var(--red-dim); }
.btn-sm { padding: 4px 10px; font-size: 11px; }

/* ─── INPUTS ────────────────────────────────────────────────────────────── */
.input-group { margin-bottom: 16px; }
.input-label {
  display: block;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 8px 12px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
.input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
select.input { cursor: pointer; }
.input-row { display: flex; gap: 10px; align-items: flex-end; }
.input-row .input-group { flex: 1; margin-bottom: 0; }

/* ─── TABLE ─────────────────────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th {
  text-align: left;
  padding: 8px 12px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  font-weight: 400;
}
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:hover { background: rgba(255,255,255,0.02); }
tbody tr:last-child { border-bottom: none; }
td { padding: 10px 12px; vertical-align: middle; }

/* ─── BADGES ────────────────────────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 10px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
}
.badge-green { background: rgba(0,229,192,0.1); color: var(--accent); }
.badge-red { background: var(--red-dim); color: var(--red); }
.badge-yellow { background: var(--yellow-dim); color: var(--yellow); }
.badge-gray { background: rgba(255,255,255,0.06); color: var(--text-dim); }

.mono { font-family: var(--mono); font-size: 12px; }
.text-dim { color: var(--text-dim); }
.text-accent { color: var(--accent); }

/* ─── TOGGLE ────────────────────────────────────────────────────────────── */
.toggle {
  position: relative;
  width: 32px; height: 18px;
  display: inline-block;
  cursor: pointer;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; inset: 0;
  background: var(--border2);
  border-radius: 10px;
  transition: 0.2s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 12px; height: 12px;
  left: 3px; bottom: 3px;
  background: var(--text-dim);
  border-radius: 50%;
  transition: 0.2s;
}
.toggle input:checked + .toggle-slider { background: var(--accent-dim); }
.toggle input:checked + .toggle-slider::before {
  transform: translateX(14px);
  background: var(--accent);
}

/* ─── MODAL ─────────────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px;
  width: 480px;
  max-width: calc(100vw - 40px);
  padding: 28px;
  transform: translateY(16px);
  transition: transform 0.2s;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}
.modal-header h2 { font-size: 16px; font-weight: 600; color: #fff; }
.modal-close {
  background: none; border: none; color: var(--text-dim);
  font-size: 20px; cursor: pointer; line-height: 1;
  padding: 2px 6px;
}
.modal-close:hover { color: var(--text); }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }

/* ─── COPY KEY ───────────────────────────────────────────────────────────── */
.key-display {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 8px 12px;
}
.key-display code {
  flex: 1;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--accent);
  word-break: break-all;
}
.key-display button {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 13px;
  padding: 2px 4px;
  transition: color 0.15s;
}
.key-display button:hover { color: var(--accent); }

/* ─── CODE BLOCK ─────────────────────────────────────────────────────────── */
.code-block {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 16px 20px;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.8;
  color: var(--text-dim);
  overflow-x: auto;
  position: relative;
}
.code-block .kw { color: var(--accent); }
.code-block .str { color: #e6b97a; }
.code-block .cmt { color: var(--muted); }
.code-block .num { color: #c9a0dc; }
.copy-btn {
  position: absolute;
  top: 10px; right: 10px;
  background: var(--border2);
  border: none;
  color: var(--text-dim);
  padding: 4px 8px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 10px;
  cursor: pointer;
  transition: all 0.15s;
}
.copy-btn:hover { background: var(--muted); color: var(--text); }

/* ─── HOME ─────────────────────────────────────────────────────────────── */
.home-hero {
  background: linear-gradient(135deg, rgba(0,229,192,0.05) 0%, transparent 60%);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 32px;
  margin-bottom: 28px;
  position: relative;
  overflow: hidden;
}
.home-hero::before {
  content: 'GATEWAY';
  position: absolute;
  right: -10px; top: 50%;
  transform: translateY(-50%);
  font-family: var(--mono);
  font-size: 80px;
  font-weight: 600;
  color: rgba(0,229,192,0.04);
  pointer-events: none;
  letter-spacing: 8px;
}
.home-hero h2 { font-size: 28px; font-weight: 600; color: #fff; line-height: 1.3; }
.home-hero p { color: var(--text-dim); margin-top: 8px; max-width: 480px; }
.home-hero .tag {
  display: inline-block;
  background: var(--accent-glow);
  border: 1px solid var(--accent-dim);
  color: var(--accent);
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 10px;
  border-radius: 10px;
  letter-spacing: 1px;
  margin-bottom: 12px;
}

.steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
.step {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.step-num {
  font-family: var(--mono);
  font-size: 28px;
  font-weight: 600;
  color: var(--border2);
  line-height: 1;
  margin-bottom: 10px;
}
.step h3 { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.step p { font-size: 12px; color: var(--text-dim); }

/* ─── LOADING / EMPTY ────────────────────────────────────────────────────── */
.empty {
  padding: 40px 20px;
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
}
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── TOAST ──────────────────────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 12px 18px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.3s;
  z-index: 200;
  max-width: 360px;
}
#toast.show { transform: translateY(0); opacity: 1; }
#toast.success { border-color: var(--accent-dim); color: var(--accent); }
#toast.error { border-color: rgba(255,77,106,0.4); color: var(--red); }

/* ─── SCROLLBAR ──────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ─── ANIMATIONS ─────────────────────────────────────────────────────────── */
.fade-in { animation: fadeIn 0.25s ease both; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* ─── NEW-KEY ALERT ──────────────────────────────────────────────────────── */
.key-alert {
  background: rgba(0,229,192,0.07);
  border: 1px solid var(--accent-dim);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 16px;
}
.key-alert-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}

/* ─── ACTIONS COL ────────────────────────────────────────────────────────── */
.actions { display: flex; gap: 6px; }

/* ─── EXPORT / IMPORT CARD ───────────────────────────────────────────────── */
.config-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 20px;
}
.config-action-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.config-action-box h3 {
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 8px;
}
.config-action-box p {
  font-size: 12px;
  color: var(--text-dim);
  flex: 1;
}
.import-drop {
  border: 1px dashed var(--border2);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 12px;
  color: var(--text-dim);
}
.import-drop:hover, .import-drop.drag-over {
  border-color: var(--accent);
  background: var(--accent-glow);
  color: var(--accent);
}
.import-summary {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 16px;
}
.import-summary-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
  font-size: 12px;
  border-bottom: 1px solid var(--border);
}
.import-summary-row:last-child { border-bottom: none; }
.import-summary-label { color: var(--text-dim); font-family: var(--mono); }
.import-summary-val   { font-weight: 600; color: var(--text); }
.import-summary-val.accent { color: var(--accent); }
.mode-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.mode-opt {
  flex: 1;
  padding: 10px 12px;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}
.mode-opt.selected {
  border-color: var(--accent);
  background: var(--accent-glow);
}
.mode-opt h4 { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.mode-opt p  { font-size: 11px; color: var(--text-dim); }
.mode-opt.selected h4 { color: var(--accent); }

/* ─── MODULE TOOLBAR ─────────────────────────────────────────────────────── */
.module-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.module-toolbar-title { flex: 1; }
.module-toolbar-title h1 { font-size: 22px; font-weight: 600; color: #fff; letter-spacing: -0.5px; }
.module-toolbar-title p  { margin-top: 4px; color: var(--text-dim); font-size: 13px; }
.toolbar-divider { width: 1px; height: 24px; background: var(--border2); margin: 0 4px; }

/* ─── CATEGORY BADGE ─────────────────────────────────────────────────────── */
.cat { font-family: var(--mono); font-size: 9px; padding: 1px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; }
.cat-documento  { background: rgba(100,149,237,0.15); color: #6495ed; }
.cat-contato    { background: rgba(144,238,144,0.12); color: #90ee90; }
.cat-financeiro { background: rgba(240,192,64,0.12);  color: #f0c040; }
.cat-credencial { background: rgba(255,77,106,0.12);  color: #ff4d6a; }
.cat-saude      { background: rgba(255,165,0,0.12);   color: #ffa500; }
.cat-rede       { background: rgba(173,216,230,0.12); color: #add8e6; }
.cat-custom     { background: rgba(255,255,255,0.06); color: var(--text-dim); }

/* ─── BUILTIN INDICATOR ─────────────────────────────────────────────────── */
.builtin-dot { color: var(--accent); font-size: 10px; margin-right: 2px; }
</style>
</head>
<body>
<div id="app">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <span class="mark">◈ Corporativo</span>
      <span class="name">LLM Gateway</span>
    </div>
    <div class="sidebar-status">
      <span class="status-dot">ONLINE</span>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section">Menu</div>
      <div class="nav-item active" data-page="home">
        <span class="nav-icon">⌂</span> Home
      </div>
      <div class="nav-section">Configuração</div>
      <div class="nav-item" data-page="rules">
        <span class="nav-icon">⊘</span> Regras
        <span class="nav-badge" id="badge-rules">—</span>
      </div>
      <div class="nav-item" data-page="models">
        <span class="nav-icon">◈</span> Modelos
        <span class="nav-badge" id="badge-models">—</span>
      </div>
      <div class="nav-item" data-page="users">
        <span class="nav-icon">◉</span> Usuários
        <span class="nav-badge" id="badge-users">—</span>
      </div>
    </div>
    <div class="sidebar-footer">v1.0.0 · Node.js</div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main" id="main-content">
    <!-- rendered by JS -->
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Modal</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
const state = { page: 'home', rules: [], models: [], users: [], newKey: null };

// ─── API ──────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch('/admin' + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data?.error?.message || 'Erro desconhecido');
  return data;
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(title, bodyHtml, footerHtml) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-footer').innerHTML = footerHtml;
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// ─── NAV ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => navigate(item.dataset.page));
});

function navigate(page) {
  state.page = page;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  renderPage();
}

// ─── RENDER ROUTER ────────────────────────────────────────────────────────────
async function renderPage() {
  const el = document.getElementById('main-content');
  el.innerHTML = `<div style="display:flex;justify-content:center;padding:60px"><div class="spinner"></div></div>`;
  try {
    if (state.page === 'home')   { el.innerHTML = renderHome(); }
    if (state.page === 'rules')  { await loadRules();  el.innerHTML = renderRules();  }
    if (state.page === 'models') { await loadModels(); el.innerHTML = renderModels(); }
    if (state.page === 'users')  { await loadAll();    el.innerHTML = renderUsers();  }
    el.querySelectorAll('.fade-in').forEach(n => {}); // trigger
  } catch(e) {
    el.innerHTML = `<div class="empty">Erro ao carregar: ${e.message}</div>`;
  }
}

// ─── LOAD DATA ────────────────────────────────────────────────────────────────
async function loadRules()  { state.rules  = await api('GET', '/blocklist'); updateBadges(); }
async function loadModels() { state.models = await api('GET', '/models');    updateBadges(); }
async function loadUsers()  { state.users  = await api('GET', '/users');     updateBadges(); }
async function loadAll()    { await Promise.all([loadModels(), loadUsers()]); }

function updateBadges() {
  if (state.rules.length)  document.getElementById('badge-rules').textContent  = state.rules.length;
  if (state.models.length) document.getElementById('badge-models').textContent = state.models.length;
  if (state.users.length)  document.getElementById('badge-users').textContent  = state.users.length;
}

// ═════════════════════════════════════════════════════════════════════════════
// HOME
// ═════════════════════════════════════════════════════════════════════════════
function renderHome() {
  return `<div class="fade-in">
  <div class="page-header">
    <h1>Bem-vindo ao Gateway</h1>
    <p>Proxy inteligente de LLM com sanitização automática de dados sensíveis.</p>
  </div>

  <div class="home-hero">
    <span class="tag">◈ PROXY CORPORATIVO</span>

// ─── TOOLBAR IMPORT/EXPORT POR MÓDULO ────────────────────────────────────────

async function exportModuleFile(module) {
  try {
    const res = await fetch(`/admin/export/${module}`);
    if (!res.ok) throw new Error('Falha ao exportar');
    const blob = await res.blob();
    const date = new Date().toISOString().slice(0, 10);
    const url  = URL.createObjectURL(blob);
    const a    = Object.assign(document.createElement('a'), {
      href: url, download: `gateway-${module}-${date}.json`
    });
    a.click();
    URL.revokeObjectURL(url);
    toast(`${module} exportado!`);
  } catch(e) { toast(e.message, 'error'); }
}

let _importMod = null, _importModPayload = null, _importModMode = 'merge';

function openModuleImport(module) {
  _importMod = module;
  _importModPayload = null;
  _importModMode = 'merge';
  const labels = { blocklist: 'Regras', models: 'Modelos', users: 'Usuários' };
  openModal(`Importar ${labels[module]}`,
    `<div class="import-drop" id="import-drop"
        onclick="document.getElementById('mod-file-input').click()"
        ondragover="event.preventDefault();this.classList.add('drag-over')"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="handleModFileDrop(event)">
      <div style="font-size:24px;margin-bottom:8px">⬆</div>
      <div>Clique ou arraste o <code style="color:var(--accent)">.json</code> de ${labels[module]}</div>
      <div style="margin-top:4px;font-size:11px;color:var(--muted)">Exportado por este gateway</div>
    </div>
    <input type="file" id="mod-file-input" accept=".json" style="display:none" onchange="handleModFileSelect(this)">
    <div id="mod-import-preview" style="display:none">
      <div class="import-summary" id="mod-import-summary"></div>
      <p style="font-size:11px;color:var(--text-dim);margin-bottom:10px">Modo de importação:</p>
      <div class="mode-selector">
        <div class="mode-opt selected" id="mod-mode-merge" onclick="selectModMode('merge')">
          <h4>Mesclar</h4><p>Adiciona novos, mantém existentes</p>
        </div>
        <div class="mode-opt" id="mod-mode-replace" onclick="selectModMode('replace')">
          <h4>Substituir</h4><p>Apaga tudo e usa apenas os importados</p>
        </div>
      </div>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-primary" id="btn-mod-confirm" style="display:none" onclick="confirmModImport()">Confirmar</button>`
  );
}

function selectModMode(mode) {
  _importModMode = mode;
  document.getElementById('mod-mode-merge').classList.toggle('selected', mode === 'merge');
  document.getElementById('mod-mode-replace').classList.toggle('selected', mode === 'replace');
}
function handleModFileDrop(e) {
  e.preventDefault();
  document.getElementById('import-drop').classList.remove('drag-over');
  const file = e.dataTransfer?.files?.[0];
  if (file) readModFile(file);
}
function handleModFileSelect(input) {
  const file = input.files?.[0];
  if (file) readModFile(file);
}
function readModFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data._gateway_export) throw new Error('Arquivo não é uma exportação do LLM Gateway.');
      if (!data[_importMod]) throw new Error(`Arquivo não contém dados de "${_importMod}".`);
      _importModPayload = data;
      const count = data[_importMod]?.length || 0;
      const date  = data._exported_at ? new Date(data._exported_at).toLocaleString('pt-BR') : '—';
      document.getElementById('mod-import-summary').innerHTML = `
        <div class="import-summary-row">
          <span class="import-summary-label">Exportado em</span>
          <span class="import-summary-val">${date}</span>
        </div>
        <div class="import-summary-row">
          <span class="import-summary-label">Itens no arquivo</span>
          <span class="import-summary-val accent">${count}</span>
        </div>`;
      document.getElementById('import-drop').style.display = 'none';
      document.getElementById('mod-import-preview').style.display = 'block';
      document.getElementById('btn-mod-confirm').style.display = 'inline-flex';
    } catch(err) { toast('Arquivo inválido: ' + err.message, 'error'); }
  };
  reader.readAsText(file);
}
async function confirmModImport() {
  if (!_importModPayload || !_importMod) return;
  if (_importModMode === 'replace' && !confirm(`Substituir TODOS os ${_importMod} atuais pelos importados?`)) return;
  try {
    const { report } = await api('POST', `/import/${_importMod}`, { payload: _importModPayload, mode: _importModMode });
    closeModal();
    const added = report.added[_importMod] || 0;
    const skip  = report.skipped[_importMod] || 0;
    toast(`Importado! +${added} adicionados, ${skip} ignorados`);
    // Recarrega a página atual
    await renderPage();
  } catch(e) { toast(e.message, 'error'); }
}

// ═════════════════════════════════════════════════════════════════════════════
// EXPORT / IMPORT
// ═════════════════════════════════════════════════════════════════════════════

async function exportConfig() {
  try {
    const res = await fetch('/admin/export');
    if (!res.ok) throw new Error('Falha ao exportar');
    const blob = await res.blob();
    const date = new Date().toISOString().slice(0, 10);
    const url  = URL.createObjectURL(blob);
    const a    = Object.assign(document.createElement('a'), { href: url, download: `gateway-config-${date}.json` });
    a.click();
    URL.revokeObjectURL(url);
    toast('Config exportada com sucesso!');
  } catch(e) { toast(e.message, 'error'); }
}

let importPayload = null;
let importMode    = 'merge';

function openImportModal() {
  importPayload = null;
  importMode    = 'merge';
  openModal('Importar configuração',
    `<div class="import-drop" id="import-drop"
        onclick="document.getElementById('file-input').click()"
        ondragover="event.preventDefault();this.classList.add('drag-over')"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="handleFileDrop(event)">
      <div style="font-size:24px;margin-bottom:8px">⬆</div>
      <div>Clique ou arraste o arquivo <code style="color:var(--accent)">.json</code></div>
      <div style="margin-top:4px;font-size:11px;color:var(--muted)">Exportado por este gateway</div>
    </div>
    <input type="file" id="file-input" accept=".json" style="display:none" onchange="handleFileSelect(this)">
    <div id="import-preview" style="display:none">
      <div class="import-summary" id="import-summary"></div>
      <p style="font-size:11px;color:var(--text-dim);margin-bottom:10px">Modo de importação:</p>
      <div class="mode-selector">
        <div class="mode-opt selected" id="mode-merge" onclick="selectMode('merge')">
          <h4>Mesclar</h4>
          <p>Adiciona novos itens, mantém os existentes</p>
        </div>
        <div class="mode-opt" id="mode-replace" onclick="selectMode('replace')">
          <h4>Substituir</h4>
          <p>Apaga tudo e usa apenas os dados importados</p>
        </div>
      </div>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-primary" id="btn-confirm-import" style="display:none" onclick="confirmImport()">Confirmar importação</button>`
  );
}

function selectMode(mode) {
  importMode = mode;
  document.getElementById('mode-merge').classList.toggle('selected', mode === 'merge');
  document.getElementById('mode-replace').classList.toggle('selected', mode === 'replace');
}

function handleFileDrop(e) {
  e.preventDefault();
  document.getElementById('import-drop').classList.remove('drag-over');
  const file = e.dataTransfer?.files?.[0];
  if (file) readImportFile(file);
}
function handleFileSelect(input) {
  const file = input.files?.[0];
  if (file) readImportFile(file);
}

function readImportFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data._gateway_export) throw new Error('Arquivo não é uma exportação do LLM Gateway.');
      importPayload = data;
      showImportPreview(data);
    } catch(err) {
      toast('Arquivo inválido: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
}

function showImportPreview(data) {
  const rules  = data.blocklist?.length  || 0;
  const models = data.models?.length     || 0;
  const users  = data.users?.length      || 0;
  const date   = data._exported_at ? new Date(data._exported_at).toLocaleString('pt-BR') : '—';

  document.getElementById('import-summary').innerHTML = `
    <div class="import-summary-row">
      <span class="import-summary-label">Exportado em</span>
      <span class="import-summary-val">${date}</span>
    </div>
    <div class="import-summary-row">
      <span class="import-summary-label">⊘ Regras</span>
      <span class="import-summary-val accent">${rules}</span>
    </div>
    <div class="import-summary-row">
      <span class="import-summary-label">◈ Modelos</span>
      <span class="import-summary-val accent">${models}</span>
    </div>
    <div class="import-summary-row">
      <span class="import-summary-label">◉ Usuários</span>
      <span class="import-summary-val accent">${users}</span>
    </div>`;

  document.getElementById('import-drop').style.display    = 'none';
  document.getElementById('import-preview').style.display = 'block';
  document.getElementById('btn-confirm-import').style.display = 'inline-flex';
}

async function confirmImport() {
  if (!importPayload) return;
  const action = importMode === 'replace'
    ? 'Isso VAI SUBSTITUIR todas as regras, modelos e usuários atuais. Continuar?'
    : 'Mesclar os dados importados com a configuração atual?';
  if (!confirm(action)) return;
  try {
    const { report } = await api('POST', '/import', { payload: importPayload, mode: importMode });
    closeModal();
    toast(`Importado! +${report.added.blocklist} regras, +${report.added.models} modelos, +${report.added.users} usuários`);
    // Recarrega tudo
    const [rules, models, users] = await Promise.all([
      api('GET', '/blocklist'), api('GET', '/models'), api('GET', '/users'),
    ]);
    state.rules = rules; state.models = models; state.users = users;
    updateBadges();
  } catch(e) { toast(e.message, 'error'); }
}

// ═════════════════════════════════════════════════════════════════════════════
// RULES
// ═════════════════════════════════════════════════════════════════════════════

const CATEGORY_LABELS = {
  documento:'Documento', contato:'Contato', financeiro:'Financeiro',
  credencial:'Credencial', saude:'Saúde', rede:'Rede', custom:'Custom'
};

function renderRules() {
  const active  = state.rules.filter(r => r.active).length;
  const total   = state.rules.length;

  // Agrupa por categoria para exibição
  const groups = {};
  for (const r of state.rules) {
    const cat = r.category || 'custom';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(r);
  }
  const catOrder = ['documento','contato','financeiro','credencial','saude','rede','custom'];

  return `<div class="fade-in">
  <div class="module-toolbar">
    <div class="module-toolbar-title">
      <h1>Regras de Sanitização</h1>
      <p>${active} de ${total} regras ativas</p>
    </div>
    <button class="btn btn-ghost" onclick="openModuleImport('blocklist')">⬆ Importar</button>
    <button class="btn btn-ghost" onclick="exportModuleFile('blocklist')">⬇ Exportar</button>
  </div>

  <div class="card">
    <div class="card-title">Adicionar regra</div>
    <div class="input-row">
      <div class="input-group">
        <label class="input-label">Tipo</label>
        <select class="input" id="rule-type" style="width:110px">
          <option value="word">Palavra</option>
          <option value="regex">Regex</option>
        </select>
      </div>
      <div class="input-group" style="flex:1">
        <label class="input-label">Valor</label>
        <input class="input" id="rule-value" placeholder="Ex: Projeto Sirius ou \\bCLIENTE-\\d+\\b">
      </div>
      <div class="input-group" style="width:160px">
        <label class="input-label">Label (UI)</label>
        <input class="input" id="rule-label" placeholder="Nome amigável">
      </div>
      <div class="input-group" style="width:130px">
        <label class="input-label">Categoria</label>
        <select class="input" id="rule-category">
          <option value="custom">Custom</option>
          <option value="documento">Documento</option>
          <option value="contato">Contato</option>
          <option value="financeiro">Financeiro</option>
          <option value="credencial">Credencial</option>
          <option value="saude">Saúde</option>
          <option value="rede">Rede</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="addRule()">+ Adicionar</button>
    </div>
  </div>

  ${catOrder.filter(cat => groups[cat]?.length).map(cat => `
  <div class="card">
    <div class="card-title">
      <span class="cat cat-${cat}">${CATEGORY_LABELS[cat] || cat}</span>
      ${groups[cat].filter(r=>r.active).length} / ${groups[cat].length} ativas
    </div>
    <div class="table-wrap">
    <table>
      <thead><tr><th style="width:36px"></th><th>Label</th><th>Padrão / Valor</th><th>Substitui por</th><th>Status</th><th>Ação</th></tr></thead>
      <tbody>
      ${groups[cat].map(r => `
        <tr>
          <td title="${r.builtin ? 'Regra padrão do gateway' : 'Regra customizada'}">
            ${r.builtin ? '<span class="builtin-dot" title="Padrão">◈</span>' : '<span style="color:var(--muted)">○</span>'}
          </td>
          <td style="font-weight:500;color:var(--text)">${escHtml(r.label || r.id)}</td>
          <td class="mono text-dim" style="max-width:260px;word-break:break-all;font-size:11px">${escHtml(r.value)}</td>
          <td class="mono" style="font-size:11px;color:var(--accent)">${escHtml(r.replacement || '[REMOVIDO]')}</td>
          <td>
            <label class="toggle" title="${r.active ? 'Clique para desativar' : 'Clique para ativar'}">
              <input type="checkbox" ${r.active ? 'checked' : ''} onchange="toggleRule('${r.id}', this.checked)">
              <span class="toggle-slider"></span>
            </label>
          </td>
          <td>
            <button class="btn btn-danger btn-sm" onclick="deleteRule('${r.id}')">✕</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>
    </div>
  </div>`).join('')}

  ${total === 0 ? '<div class="empty">Nenhuma regra. Clique em "+ Adicionar" para começar.</div>' : ''}
</div>`;
}

async function addRule() {
  const value    = document.getElementById('rule-value').value.trim();
  const type     = document.getElementById('rule-type').value;
  const label    = document.getElementById('rule-label').value.trim();
  const category = document.getElementById('rule-category').value;
  if (!value) return toast('Informe um valor para a regra.', 'error');
  try {
    await api('POST', '/blocklist', { value, type, label, category });
    toast('Regra adicionada!');
    await loadRules();
    document.getElementById('main-content').innerHTML = renderRules();
  } catch(e) { toast(e.message, 'error'); }
}

async function toggleRule(id, active) {
  try {
    await api('PATCH', `/blocklist/${id}`, { active });
    state.rules = await api('GET', '/blocklist');
    updateBadges();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteRule(id) {
  const rule = state.rules.find(r => r.id === id);
  const msg  = rule?.builtin
    ? `Remover a regra padrão "${rule.label}"? Ela não será mais aplicada.`
    : 'Remover esta regra?';
  if (!confirm(msg)) return;
  try {
    await api('DELETE', `/blocklist/${id}`);
    toast('Regra removida.');
    await loadRules();
    document.getElementById('main-content').innerHTML = renderRules();
  } catch(e) { toast(e.message, 'error'); }
}

// ═════════════════════════════════════════════════════════════════════════════
// MODELS
// ═════════════════════════════════════════════════════════════════════════════
function renderModels() {
  return `<div class="fade-in">
  <div class="module-toolbar">
    <div class="module-toolbar-title">
      <h1>Modelos disponíveis</h1>
      <p>Modelos que podem ser atribuídos a usuários. Formato: <code style="color:var(--accent)">provider:modelo</code></p>
    </div>
    <button class="btn btn-ghost" onclick="openModuleImport('models')">⬆ Importar</button>
    <button class="btn btn-ghost" onclick="exportModuleFile('models')">⬇ Exportar</button>
  </div>

  <div class="card">
    <div class="card-title">Adicionar modelo</div>
    <div class="input-row">
      <div class="input-group">
        <label class="input-label">Provider:Modelo</label>
        <input class="input" id="model-value" placeholder="lmstudio:qwen/qwen3-8b">
      </div>
      <div class="input-group" style="width:200px">
        <label class="input-label">Label (opcional)</label>
        <input class="input" id="model-label" placeholder="Qwen3 8B Local">
      </div>
      <button class="btn btn-primary" onclick="addModel()">+ Adicionar</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:12px">
      ${[
        'openai:gpt-4o','openai:gpt-4o-mini','openai:o1-mini',
        'anthropic:claude-3-5-sonnet-20241022','anthropic:claude-3-5-haiku-20241022',
        'google:gemini-2.0-flash','google:gemini-1.5-pro',
        'mistral:mistral-large-latest',
        'ollama:llama3.2','ollama:phi4','ollama:codellama',
        'lmstudio:qwen/qwen3-8b','lmstudio:local-model',
        'openrouter:meta-llama/llama-3.1-8b-instruct:free'
      ].map(m => `<button class="btn btn-ghost btn-sm" onclick="prefillModel('${m}')">${m}</button>`).join('')}
    </div>
  </div>

  <div class="card">
    <div class="card-title">Modelos cadastrados</div>
    <div class="table-wrap">
    <table>
      <thead><tr><th>Provider</th><th>Modelo</th><th>Label</th><th>Ação</th></tr></thead>
      <tbody>
      ${state.models.length === 0 ? `<tr><td colspan="4"><div class="empty">Nenhum modelo cadastrado.</div></td></tr>` : ''}
      ${state.models.map(m => {
        const [provider, ...rest] = m.value.split(':');
        return `<tr>
          <td><span class="badge badge-gray">${escHtml(provider)}</span></td>
          <td class="mono text-accent">${escHtml(rest.join(':'))}</td>
          <td class="text-dim">${escHtml(m.label)}</td>
          <td><button class="btn btn-danger btn-sm" onclick="deleteModel('${m.id}')">✕ Remover</button></td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>
    </div>
  </div>
</div>`;
}

function prefillModel(val) {
  document.getElementById('model-value').value = val;
  document.getElementById('model-label').value = '';
  document.getElementById('model-value').focus();
}

async function addModel() {
  const value = document.getElementById('model-value').value.trim();
  const label = document.getElementById('model-label').value.trim();
  if (!value) return toast('Informe o modelo no formato provider:modelo.', 'error');
  if (!value.includes(':')) return toast('Formato inválido. Use provider:modelo (ex: openai:gpt-4o)', 'error');
  try {
    await api('POST', '/models', { value, label });
    toast('Modelo adicionado!');
    await loadModels();
    document.getElementById('main-content').innerHTML = renderModels();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteModel(id) {
  if (!confirm('Remover este modelo? Usuários que o utilizam precisarão ser atualizados.')) return;
  try {
    await api('DELETE', `/models/${id}`);
    toast('Modelo removido.');
    await loadModels();
    document.getElementById('main-content').innerHTML = renderModels();
  } catch(e) { toast(e.message, 'error'); }
}

// ═════════════════════════════════════════════════════════════════════════════
// USERS
// ═════════════════════════════════════════════════════════════════════════════
function renderUsers() {
  return `<div class="fade-in">
  <div class="module-toolbar">
    <div class="module-toolbar-title">
      <h1>Usuários</h1>
      <p>Cada usuário tem uma API key única e um modelo padrão atribuído.</p>
    </div>
    <button class="btn btn-ghost" onclick="openModuleImport('users')">⬆ Importar</button>
    <button class="btn btn-ghost" onclick="exportModuleFile('users')">⬇ Exportar</button>
  </div>

  ${state.newKey ? `
  <div class="key-alert">
    <div class="key-alert-title">⚠ Salve esta key agora — ela não será exibida novamente</div>
    <div class="key-display">
      <code id="new-key-val">${escHtml(state.newKey)}</code>
      <button onclick="copyText('${escHtml(state.newKey)}', this)" title="Copiar">⎘</button>
    </div>
  </div>` : ''}

  <div style="display:flex;justify-content:flex-end;margin-bottom:20px">
    <button class="btn btn-primary" onclick="openAddUser()">+ Novo usuário</button>
  </div>

  <div class="card">
    <div class="card-title">Usuários cadastrados</div>
    <div class="table-wrap">
    <table>
      <thead><tr><th>Nome</th><th>API Key</th><th>Modelo padrão</th><th>Status</th><th>Criado em</th><th>Ações</th></tr></thead>
      <tbody>
      ${state.users.length === 0 ? `<tr><td colspan="6"><div class="empty">Nenhum usuário cadastrado. Crie o primeiro!</div></td></tr>` : ''}
      ${state.users.map(u => {
        const model = state.models.find(m => m.value === u.model);
        return `<tr>
          <td style="font-weight:500;color:#fff">${escHtml(u.name)}</td>
          <td class="mono text-dim">${escHtml(u.keyPreview)}</td>
          <td>${u.model
            ? `<span class="badge badge-green">◈ ${escHtml(model ? model.label : u.model)}</span>`
            : `<span class="badge badge-gray">DEFAULT_PROVIDER</span>`
          }</td>
          <td><span class="badge ${u.active ? 'badge-green' : 'badge-red'}">${u.active ? '● ativo' : '○ inativo'}</span></td>
          <td class="text-dim mono" style="font-size:11px">${new Date(u.createdAt).toLocaleDateString('pt-BR')}</td>
          <td class="actions">
            <button class="btn btn-ghost btn-sm" onclick="openEditUser('${u.id}')">✎ Editar</button>
            <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}')">✕</button>
          </td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>
    </div>
  </div>
</div>`;
}

function openAddUser() {
  const modelOptions = state.models.map(m =>
    `<option value="${escHtml(m.value)}">${escHtml(m.label)} (${escHtml(m.value)})</option>`
  ).join('');

  openModal('Novo usuário',
    `<div class="input-group">
      <label class="input-label">Nome / Identificador</label>
      <input class="input" id="u-name" placeholder="ex: time-dev, joao.silva, rh-sistema">
    </div>
    <div class="input-group">
      <label class="input-label">API Key</label>
      <div style="display:flex;gap:8px">
        <input class="input" id="u-key" placeholder="gw_..." style="flex:1">
        <button class="btn btn-ghost" onclick="generateKey()">⟳ Gerar</button>
      </div>
    </div>
    <div class="input-group">
      <label class="input-label">Modelo padrão</label>
      <select class="input" id="u-model">
        <option value="">— usar DEFAULT_PROVIDER —</option>
        ${modelOptions}
      </select>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-primary" onclick="saveUser()">Criar usuário</button>`
  );
  // Auto-gera uma key
  generateKey();
}

function openEditUser(id) {
  const user = state.users.find(u => u.id === id);
  if (!user) return;
  const modelOptions = state.models.map(m =>
    `<option value="${escHtml(m.value)}" ${m.value === user.model ? 'selected' : ''}>${escHtml(m.label)} (${escHtml(m.value)})</option>`
  ).join('');

  openModal('Editar usuário',
    `<input type="hidden" id="u-edit-id" value="${user.id}">
    <div class="input-group">
      <label class="input-label">Nome</label>
      <input class="input" id="u-edit-name" value="${escHtml(user.name)}">
    </div>
    <div class="input-group">
      <label class="input-label">Modelo padrão</label>
      <select class="input" id="u-edit-model">
        <option value="">— usar DEFAULT_PROVIDER —</option>
        ${modelOptions}
      </select>
    </div>
    <div class="input-group">
      <label class="input-label">Status</label>
      <select class="input" id="u-edit-active">
        <option value="true"  ${user.active ? 'selected':''}>Ativo</option>
        <option value="false" ${!user.active ? 'selected':''}>Inativo</option>
      </select>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-primary" onclick="saveEditUser()">Salvar</button>`
  );
}

async function generateKey() {
  try {
    const { key } = await api('GET', '/users/generate-key');
    const input = document.getElementById('u-key');
    if (input) input.value = key;
  } catch(e) { toast(e.message, 'error'); }
}

async function saveUser() {
  const name  = document.getElementById('u-name')?.value.trim();
  const key   = document.getElementById('u-key')?.value.trim();
  const model = document.getElementById('u-model')?.value || null;
  if (!name) return toast('Informe um nome.', 'error');
  if (!key)  return toast('Informe ou gere uma API key.', 'error');
  try {
    const user = await api('POST', '/users', { name, key, model: model || null });
    state.newKey = user.key; // guarda para exibir uma vez
    toast(`Usuário "${name}" criado!`);
    closeModal();
    await loadUsers();
    document.getElementById('main-content').innerHTML = renderUsers();
  } catch(e) { toast(e.message, 'error'); }
}

async function saveEditUser() {
  const id     = document.getElementById('u-edit-id')?.value;
  const name   = document.getElementById('u-edit-name')?.value.trim();
  const model  = document.getElementById('u-edit-model')?.value || null;
  const active = document.getElementById('u-edit-active')?.value === 'true';
  try {
    await api('PATCH', `/users/${id}`, { name, model: model || null, active });
    toast('Usuário atualizado!');
    closeModal();
    await loadUsers();
    state.newKey = null;
    document.getElementById('main-content').innerHTML = renderUsers();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteUser(id) {
  if (!confirm('Remover este usuário? A key será invalidada imediatamente.')) return;
  try {
    await api('DELETE', `/users/${id}`);
    toast('Usuário removido.');
    state.newKey = null;
    await loadUsers();
    document.getElementById('main-content').innerHTML = renderUsers();
  } catch(e) { toast(e.message, 'error'); }
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    if (btn) { const orig = btn.textContent; btn.textContent = '✓'; setTimeout(() => btn.textContent = orig, 1500); }
    toast('Copiado!');
  });
}

function copyCode(btn) {
  const block = btn.parentElement;
  const text = block.innerText.replace('copiar','').trim();
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ copiado';
    setTimeout(() => btn.textContent = 'copiar', 1800);
  });
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
(async () => {
  // Pré-carrega badges
  try {
    const [rules, models, users] = await Promise.all([
      api('GET', '/blocklist'),
      api('GET', '/models'),
      api('GET', '/users'),
    ]);
    state.rules = rules; state.models = models; state.users = users;
    updateBadges();
  } catch {}
  renderPage();
})();
</script>
