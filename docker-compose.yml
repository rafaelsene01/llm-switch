services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: deps
    command: npx nx run api:serve
    ports:
      - "3000:3000"
    volumes:
      - ./apps/api/src:/workspace/apps/api/src:ro
      - ./data:/workspace/data
      - ./logs:/workspace/logs
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: deps
    command: npx nx run web:dev
    ports:
      - "3001:3001"
    environment:
      - API_URL=http://api:3000
      - NEXT_PUBLIC_ADMIN_KEY=${ADMIN_KEY}
    volumes:
      - ./apps/web/src:/workspace/apps/web/src:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
